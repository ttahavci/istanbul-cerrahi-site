name: Sync Real Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download source site images
        run: python scripts/sync-real-images.py

      - name: Commit downloaded images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/img
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Gerçek site görselleri senkronize edildi"
            git push
          fi
