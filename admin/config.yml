backend:
  name: github
  repo: YOUR_GITHUB_USER/YOUR_REPO_NAME
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "duyurular"
    label: "Duyurular"
    folder: "content/duyurular"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Kısa Açıklama", name: "summary", widget: "text"}
      - {label: "Tip", name: "type", widget: "select", options: ["Randevu", "Kurumsal", "SGK", "Genel"]}
      - {label: "Aktif", name: "active", widget: "boolean", default: true}
      - {label: "Sıralama", name: "order", widget: "number", default: 1}
      - {label: "Yayın Tarihi", name: "date", widget: "datetime"}
  - name: "hekimler"
    label: "Hekimler"
    folder: "content/hekimler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Ad Soyad", name: "title", widget: "string"}
      - {label: "Branş", name: "branch", widget: "string"}
      - {label: "Ünvan", name: "degree", widget: "string", required: false}
      - {label: "Fotoğraf", name: "photo", widget: "image", required: false}
      - {label: "Türkçe Sesli CV/Video", name: "video_tr", widget: "string", required: false}
      - {label: "İngilizce Sesli CV/Video", name: "video_en", widget: "string", required: false}
      - {label: "Tanıtım Metni", name: "body", widget: "markdown"}
      - {label: "Uzmanlık Alanları", name: "expertise", widget: "list", required: false}
      - {label: "Aktif", name: "active", widget: "boolean", default: true}
  - name: "tibbi_birimler"
    label: "Tıbbi Birimler"
    folder: "content/tibbi-birimler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Kapak Görseli", name: "image", widget: "image", required: false}
      - {label: "Kısa Açıklama", name: "summary", widget: "text"}
      - {label: "Detaylı İçerik", name: "body", widget: "markdown"}
      - {label: "Aktif", name: "active", widget: "boolean", default: true}
  - name: "saglik_rehberi"
    label: "Sağlık Rehberi"
    folder: "content/saglik-rehberi"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Kategori", name: "category", widget: "string"}
      - {label: "Kapak Görseli", name: "image", widget: "image", required: false}
      - {label: "Özet", name: "summary", widget: "text"}
      - {label: "İçerik", name: "body", widget: "markdown"}
      - {label: "SEO Başlığı", name: "seo_title", widget: "string", required: false}
      - {label: "SEO Açıklaması", name: "seo_description", widget: "text", required: false}
